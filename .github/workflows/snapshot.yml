name: Raticals Staking Snapshot

on:
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show checked out commit
        run: |
          echo "Branch/ref:"
          git branch --show-current || true
          echo "Commit:"
          git rev-parse HEAD
          echo "Recent commits:"
          git log --oneline -5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Verify points formula
        run: |
          echo "Checking points.js contains 1:1 pairing formula..."
          grep -n "pairedCount" src/points.js || true
          grep -n "calcDailyPoints" src/points.js || true

          echo "Testing formula directly..."
          node - <<'NODE'
          const { calcDailyPoints, calcSnapshotPoints } = require('./src/points');

          const tests = [
            [1, 0],
            [0, 1],
            [1, 1],
            [2, 1],
            [5, 5],
            [66, 0],
            [66, 1],
            [66, 10],
          ];

          for (const [rats, poison] of tests) {
            console.log(
              `${rats} rats + ${poison} poison => daily=${calcDailyPoints(rats, poison)}, snapshot=${calcSnapshotPoints(rats, poison)}`
            );
          }
          NODE

      - name: Run snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}
          OPENSEA_API_KEY: ${{ secrets.OPENSEA_API_KEY }}
          RATICALS_CONTRACT: ${{ secrets.RATICALS_CONTRACT }}
          RATPOISON_CONTRACT: ${{ secrets.RATPOISON_CONTRACT }}
        run: node src/snapshot.js
